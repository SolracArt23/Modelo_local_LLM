<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat con LLaMA3 (Ollama)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; }
        .chat-container {
            max-width: 700px;
            margin: 50px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .chat-message {
            margin-top: 20px;
        }
        .user-message { font-weight: bold; color: #0d6efd; }
        .bot-message { font-weight: 500; color: #212529; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2 class="mb-4">🤖 Chat con <span class="text-primary">LLaMA3</span></h2>
        <form method="POST">
            <div class="input-group mb-3">
                <input name="mensaje" class="form-control" placeholder="Escribe tu mensaje..." required autofocus>
                <button class="btn btn-primary" type="submit">Enviar</button>
            </div>
        </form>
        {% if mensaje %}
            <div class="chat-message">
                <p class="user-message">Tú: {{ mensaje }}</p>
                <p class="bot-message">LLaMA3: {{ respuesta }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
